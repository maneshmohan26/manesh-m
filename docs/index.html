<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manesh | Senior Digital Marketing Executive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              theme: {
                primary: 'var(--color-primary)',
                bg: 'var(--color-background)',
                'bg-alt': 'var(--color-background-alt)',
                accent: 'var(--color-accent)',
                'accent-alt': 'var(--color-accent-alt)',
                text: 'var(--color-text-primary)',
                'text-muted': 'var(--color-text-secondary)',
                border: 'var(--color-border-ui)',
                'border-alt': 'var(--color-border-ui-alt)',
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-primary: #0f172a;
        --color-background: #020617;
        --color-background-alt: #0a0f1e;
        --color-accent: #06b6d4;
        --color-accent-alt: #3b82f6;
        --color-text-primary: #f8fafc;
        --color-text-secondary: #94a3b8;
        --color-border-ui: rgba(255, 255, 255, 0.08);
        --color-border-ui-alt: rgba(255, 255, 255, 0.1);
        transition: background-color 0.5s ease, color 0.5s ease;
      }

      :root.personal-mode {
        --color-primary: #1F3D36;
        --color-background: #0B0F0E;
        --color-background-alt: #121A18;
        --color-accent: #2EC4B6;
        --color-accent-alt: #6EE7D8;
        --color-text-primary: #E6F1EE;
        --color-text-secondary: #9FB3AE;
        --color-border-ui: #1C2A27;
        --color-border-ui-alt: #2A3F3B;
      }

      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: var(--color-background);
        color: var(--color-text-primary);
        overflow-x: hidden;
        transition: background-color 0.5s ease, color 0.5s ease;
      }
      * {
        scrollbar-width: thin;
        scrollbar-color: var(--color-border-ui-alt) var(--color-background);
        transition: border-color 0.3s ease, background-color 0.3s ease, color 0.3s ease;
      }
      *::-webkit-scrollbar {
        width: 6px;
      }
      *::-webkit-scrollbar-track {
        background: var(--color-background);
      }
      *::-webkit-scrollbar-thumb {
        background-color: var(--color-border-ui-alt);
        border-radius: 10px;
      }
      .glass {
        background: var(--color-primary);
        opacity: 0.8;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--color-border-ui);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      }
      .glow-accent {
        box-shadow: 0 0 20px var(--color-accent), inset 0 0 20px var(--color-accent);
        border-color: var(--color-accent);
      }
      .gradient-text {
        background: linear-gradient(180deg, var(--color-text-primary) 0%, var(--color-text-secondary) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .noise-bg {
        background-image: url("https://grainy-gradients.vercel.app/noise.svg");
        opacity: 0.03;
        pointer-events: none;
        animation: noise-jitter 0.2s infinite steps(2);
      }
      @keyframes noise-jitter {
        0% { transform: translate(0,0); }
        10% { transform: translate(-1px, -1px); }
        20% { transform: translate(1px, 1px); }
        30% { transform: translate(-2px, 2px); }
        40% { transform: translate(2px, -2px); }
        100% { transform: translate(0,0); }
      }
      .mask-faded-sides {
        mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
      }

      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none; /* IE and Edge */
        scrollbar-width: none; /* Firefox */
      }
      
      /* Blog Content Styles */
      .blog-content h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1.5rem; color: var(--color-text-primary); }
      .blog-content h2 { font-size: 2rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; color: var(--color-text-primary); }
      .blog-content h3 { font-size: 1.5rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; color: var(--color-text-primary); }
      .blog-content p { margin-bottom: 1.25rem; line-height: 1.8; }
      .blog-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.25rem; }
      .blog-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1.25rem; }
      .blog-content li { margin-bottom: 0.5rem; }
      .blog-content blockquote { border-left: 4px solid var(--color-accent); padding-left: 1.5rem; font-style: italic; margin: 2rem 0; color: var(--color-text-secondary); }
      .blog-content pre { background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 1rem; overflow-x: auto; margin-bottom: 1.25rem; font-family: monospace; }
      .blog-content img { border-radius: 1.5rem; margin: 2rem 0; width: 100%; height: auto; border: 1px solid var(--color-border-ui); }
      .blog-content a { color: var(--color-accent); text-decoration: underline; transition: opacity 0.2s; }
      .blog-content a:hover { opacity: 0.8; }
    </style>
